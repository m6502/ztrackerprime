# GitHub Actions CI for zTracker Prime
#
# Builds `zt` on every push and every PR against master, across:
#   - Windows x86 (32-bit, XP-compatible) -- MinGW-w64 cross from Ubuntu
#   - Windows x64 (modern)                -- MSVC on windows-latest
#   - macOS universal (Intel x86_64 + Apple Silicon arm64) -- one self-contained
#       .app, floor 10.13 (x86_64) / 11.0 (arm64); built on macos-14
#   - Linux x86_64                         -- ubuntu-24.04
#
# Each job uploads an artifact containing:
#   zt(.exe), zt.conf, skins/, doc/   (plus required runtime DLLs on Windows)
#
# Design notes:
#   * Each platform is a separate job (not a deep matrix axis) for clarity --
#     the install / SDL3 sourcing logic differs enough per platform that a
#     unified matrix would be harder to read than 5 small jobs.
#   * Windows x86 XP compatibility: cross-compile with MinGW-w64 from Ubuntu,
#     define _WIN32_WINNT=0x0501 (Windows XP). SDL3 ships official MinGW
#     binaries that work on XP per upstream docs.
#   * Windows x64 uses MSVC + the SDL3-devel-VC release zip (the standard
#     modern Windows path).
#   * macOS: ONE universal artifact. Homebrew's SDL3 is single-arch and minos-15,
#     so we build a universal SDL3 from source at the 10.13 target and bundle it
#     into the .app (self-contained). A hard-gate verify step asserts the binary
#     is universal, the per-slice floors are 10.13/11.0, and no Homebrew dep
#     leaks. Ableton Link is header-only, compiled into both slices.
#   * Linux: Ubuntu 24.04's apt does not yet ship libsdl3-dev, so we build
#     SDL3 from source (same tarball as Windows) into a local prefix and
#     pass -DSDL3_INCLUDE_DIR / -DSDL3_LIBRARY like Windows does.
#   * The upstream source tree does NOT ship extlibs/libpng and extlibs/zlib;
#     the maintainer expects contributors to drop curated copies in place.
#     CI fetches libpng 1.6.44 and zlib 1.3.1 tarballs on every run and
#     extracts them flat into extlibs/libpng and extlibs/zlib so that
#     extlibs/libpng/png.c and extlibs/zlib/adler32.c (etc.) exist at the
#     paths CMakeLists.txt references.

name: Build

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      simulate_tag:
        description: 'Synthetic tag for packaging filenames (e.g. v0.0.0-test). Triggers full packaging path; does NOT publish a GitHub Release.'
        required: false
        default: 'v0.0.0-test'

# Allow only one concurrent run per branch / PR; cancel older runs.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  SDL3_VERSION: "3.4.4"
  LIBPNG_VERSION: "1.6.44"
  ZLIB_VERSION: "1.3.1"
  # On tag push: the real tag (e.g. v1.2.3). On manual dispatch: the simulated
  # tag input. On regular branch/PR pushes: empty (packaging steps skipped).
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_tag || (startsWith(github.ref, 'refs/tags/v') && github.ref_name || '') }}

jobs:
  # ---------------------------------------------------------------------------
  # Linux x86_64
  # ---------------------------------------------------------------------------
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libasound2-dev libpulse-dev \
            libx11-dev libxext-dev libxcursor-dev libxrandr-dev \
            libxi-dev libxss-dev libxxf86vm-dev libxfixes-dev \
            libxrender-dev \
            libwayland-dev libxkbcommon-dev libdrm-dev libgbm-dev \
            libdecor-0-dev libdbus-1-dev libibus-1.0-dev \
            libudev-dev libsndio-dev

      - name: Fetch External Dependencies
        shell: bash
        run: |
          set -euo pipefail
          bash fetch-ext-deps.sh

      - name: Cache SDL3 source tarball
        id: cache-sdl3-src
        uses: actions/cache@v4
        with:
          path: sdl3-src-cache
          key: sdl3-src-${{ env.SDL3_VERSION }}

      - name: Download + build SDL3 from source
        id: sdl3
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p sdl3-src-cache
          TARBALL="sdl3-src-cache/SDL3-${SDL3_VERSION}.tar.gz"
          if [ ! -f "$TARBALL" ]; then
            curl -fL -o "$TARBALL" \
              "https://github.com/libsdl-org/SDL/releases/download/release-${SDL3_VERSION}/SDL3-${SDL3_VERSION}.tar.gz"
          fi
          rm -rf sdl3-src
          mkdir -p sdl3-src
          tar xf "$TARBALL" -C sdl3-src --strip-components=1
          # Disable optional X11 extensions zTracker doesn't use, so we don't have
          # to chase a growing list of libX*-dev packages on the Ubuntu runner.
          cmake -S sdl3-src -B sdl3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$(pwd)/sdl3-prefix" \
            -DSDL_SHARED=ON -DSDL_STATIC=OFF \
            -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF \
            -DSDL_X11_XCURSOR=OFF -DSDL_X11_XINPUT=OFF \
            -DSDL_X11_XRANDR=OFF -DSDL_X11_XSCRNSAVER=OFF \
            -DSDL_X11_XSHAPE=OFF -DSDL_X11_XFIXES=OFF \
            -DSDL_X11_XTEST=OFF
          cmake --build sdl3-build -j
          cmake --install sdl3-build
          PREFIX="$(pwd)/sdl3-prefix"
          {
            echo "include=$PREFIX/include"
            echo "lib=$PREFIX/lib/libSDL3.so"
          } >> "$GITHUB_OUTPUT"

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL3_INCLUDE_DIR="${{ steps.sdl3.outputs.include }}" \
            -DSDL3_LIBRARY="${{ steps.sdl3.outputs.lib }}"

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: ThreadSanitizer unit tests
        run: |
          cmake -S . -B build-tsan -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=thread -g -O1" \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -g -O1" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DSDL3_INCLUDE_DIR="${{ steps.sdl3.outputs.include }}" \
            -DSDL3_LIBRARY="${{ steps.sdl3.outputs.lib }}"
          # Only the test targets need TSan (SDL-free). The point is the
          # threaded suite: test_sysex_stress drives 4 producer threads + a
          # consumer against the SysEx queue mutex. Locks in the project's
          # thread-safety posture (incl. the std::atomic MIDI-clock counters).
          cmake --build build-tsan -j --target test_sysex_stress test_sysex_inq test_midi_clock_sync
          ctest --test-dir build-tsan --output-on-failure -R "sysex_stress|sysex_inq|midi_clock_sync"

      - name: Stage release
        run: |
          mkdir -p dist/ztrackerprime-linux-x86_64
          cp build/Program/zt        dist/ztrackerprime-linux-x86_64/
          cp zt.conf                 dist/ztrackerprime-linux-x86_64/
          cp -R skins                dist/ztrackerprime-linux-x86_64/
          cp -R doc                  dist/ztrackerprime-linux-x86_64/
          cp -R assets/ccizer        dist/ztrackerprime-linux-x86_64/
          cp -R assets/syx           dist/ztrackerprime-linux-x86_64/
          # Ship libSDL3.so.0 next to the binary so the artifact is self-
          # contained -- the system apt does not yet provide SDL3.
          cp -a sdl3-prefix/lib/libSDL3.so*  dist/ztrackerprime-linux-x86_64/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ztrackerprime-linux-x86_64
          path: dist/ztrackerprime-linux-x86_64
          if-no-files-found: error

      - name: Package release tarball
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/pr-release-packaging'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          TAG="${RELEASE_TAG}"
          tar -czf "ztrackerprime-${TAG}-linux-x86_64.tar.gz" ztrackerprime-linux-x86_64

      - name: Upload release asset (linux)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/pr-release-packaging'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x86_64
          path: dist/ztrackerprime-*-linux-x86_64.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS universal (Intel x86_64 + Apple Silicon arm64), one self-contained app
  # ---------------------------------------------------------------------------
  # Floor: macOS 10.13 on the x86_64 slice, 11.0 on the arm64 slice (the linker
  # auto-clamps arm64 -- no arm64 exists below Big Sur). Built against a
  # universal SDL3 compiled from source at the same 10.13 target (Homebrew's
  # SDL3 is single-arch and minos-15, so it cannot be used here). SDL3 is bundled
  # into the .app, so the artifact runs with no Homebrew / system SDL3 present.
  # The verify step is a HARD GATE: the job fails if the binary is not universal,
  # the per-slice floors are wrong, or the app is not self-contained.
  macos-universal:
    name: macOS universal (Intel + Apple Silicon)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          brew update
          brew install cmake ninja

      - name: Fetch Ableton Link
        shell: bash
        run: |
          set -euo pipefail
          bash fetch-ext-deps.sh

      - name: Cache SDL3 source tarball
        id: cache-sdl3-src
        uses: actions/cache@v4
        with:
          path: sdl3-src-cache
          key: sdl3-src-${{ env.SDL3_VERSION }}

      - name: Download + build universal SDL3 from source (10.13)
        id: sdl3
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p sdl3-src-cache
          TARBALL="sdl3-src-cache/SDL3-${SDL3_VERSION}.tar.gz"
          if [ ! -f "$TARBALL" ]; then
            curl -fL -o "$TARBALL" \
              "https://github.com/libsdl-org/SDL/releases/download/release-${SDL3_VERSION}/SDL3-${SDL3_VERSION}.tar.gz"
          fi
          rm -rf sdl3-src
          mkdir -p sdl3-src
          tar xf "$TARBALL" -C sdl3-src --strip-components=1
          cmake -S sdl3-src -B sdl3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$(pwd)/sdl3-prefix" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13 \
            -DSDL_SHARED=ON -DSDL_STATIC=OFF \
            -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF
          cmake --build sdl3-build -j
          cmake --install sdl3-build
          PREFIX="$(pwd)/sdl3-prefix"
          {
            echo "include=$PREFIX/include"
            echo "lib=$PREFIX/lib/libSDL3.0.dylib"
          } >> "$GITHUB_OUTPUT"

      - name: Configure (universal, 10.13, Ableton Link ON)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13 \
            -DZT_ENABLE_ABLETON_LINK=ON \
            -DSDL3_INCLUDE_DIR="${{ steps.sdl3.outputs.include }}" \
            -DSDL3_LIBRARY="${{ steps.sdl3.outputs.lib }}"

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run unit tests (incl. Lua API self-test, headless)
        run: ctest --test-dir build --output-on-failure

      - name: Verify universal + low floor + self-contained (HARD GATE)
        shell: bash
        run: |
          set -euo pipefail
          BIN=build/Program/zt.app/Contents/MacOS/zt
          APP=build/Program/zt.app
          fail=0

          echo "== architectures =="
          archs="$(lipo -archs "$BIN")"; echo "  $archs"
          echo "$archs" | grep -q x86_64 && echo "$archs" | grep -q arm64 \
            || { echo "  FAIL: not universal"; fail=1; }

          echo "== per-slice deployment floor =="
          slice_min () { vtool -arch "$1" -show-build "$BIN" 2>/dev/null | awk '/(minos|version) /{print $2; exit}'; }
          X="$(slice_min x86_64)"; A="$(slice_min arm64)"
          echo "  x86_64=$X (want 10.13)   arm64=$A (want 11.0)"
          [ "$X" = "10.13" ] || { echo "  FAIL: x86_64 floor"; fail=1; }
          [ "$A" = "11.0" ]  || { echo "  FAIL: arm64 floor"; fail=1; }

          echo "== self-contained (no Homebrew / /usr/local deps) =="
          if otool -L "$BIN" | grep -E "/opt/|/usr/local/"; then
            echo "  FAIL: non-system absolute dependency remains"; fail=1
          else
            echo "  OK"
          fi

          echo "== bundled SDL3 is universal =="
          sdlarchs="$(lipo -archs "$APP/Contents/Frameworks/libSDL3.0.dylib" 2>/dev/null || true)"
          echo "  SDL3: $sdlarchs"
          echo "$sdlarchs" | grep -q x86_64 && echo "$sdlarchs" | grep -q arm64 \
            || { echo "  FAIL: bundled SDL3 not universal"; fail=1; }

          echo "== ad-hoc signature valid =="
          codesign --verify --deep "$APP" && echo "  OK" || { echo "  FAIL: signature"; fail=1; }

          echo "== arm64 renders headless =="
          printf 'wait 400\nkey F11\nwait 200\nshot %s\nquit\n' "$PWD/zt-ci-smoke.png" > zt-ci.script
          arch -arm64 "$BIN" --headless --script zt-ci.script >/dev/null 2>&1 || true
          [ -s zt-ci-smoke.png ] && echo "  OK ($(stat -f%z zt-ci-smoke.png) bytes)" \
            || { echo "  FAIL: no framebuffer rendered"; fail=1; }

          [ "$fail" -eq 0 ] || { echo "VERIFY FAILED"; exit 1; }
          echo "VERIFY PASSED: universal, 10.13/11.0, self-contained, Link ON, renders"

      - name: Stage release
        run: |
          mkdir -p dist/ztrackerprime-macos-universal
          cp -R build/Program/zt.app dist/ztrackerprime-macos-universal/
          cp zt.conf                 dist/ztrackerprime-macos-universal/
          cp -R skins                dist/ztrackerprime-macos-universal/
          cp -R doc                  dist/ztrackerprime-macos-universal/
          # macOS users hit "zt.app is damaged" because the build is unsigned
          # (no Apple Developer Program). README explains the xattr fix.
          cp .github/release-notes/README-MAC.txt dist/ztrackerprime-macos-universal/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ztrackerprime-macos-universal
          path: dist/ztrackerprime-macos-universal
          if-no-files-found: error

      - name: Package release (zip + unsigned DMG)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/pr-release-packaging'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          TAG="${RELEASE_TAG}"
          ARCH="universal"
          ditto -c -k --sequesterRsrc --keepParent \
            "ztrackerprime-macos-${ARCH}" \
            "ztrackerprime-${TAG}-macos-${ARCH}.zip"
          mkdir -p "dmg-staging-${ARCH}"
          cp -R "ztrackerprime-macos-${ARCH}/zt.app"         "dmg-staging-${ARCH}/"
          cp    "ztrackerprime-macos-${ARCH}/README-MAC.txt" "dmg-staging-${ARCH}/"
          hdiutil create \
            -volname "zTracker ${TAG} (${ARCH})" \
            -srcfolder "dmg-staging-${ARCH}" \
            -fs HFS+ -format UDZO -ov \
            "ztrackerprime-${TAG}-macos-${ARCH}.dmg"

      - name: Upload release asset (macos-universal)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/pr-release-packaging'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-universal
          path: |
            dist/ztrackerprime-*-macos-universal.zip
            dist/ztrackerprime-*-macos-universal.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows x86 (32-bit, XP-compatible) -- cross from Ubuntu via MinGW-w64
  # ---------------------------------------------------------------------------
  # Why cross from Linux instead of MSYS2 on windows-latest:
  #   * Faster spin-up (Linux runners boot quicker than Windows runners).
  #   * Easier caching of the SDL3 mingw zip.
  #   * MSYS2 setup on Windows runners adds several minutes of toolchain
  #     bootstrap on every run.
  windows-x86-xp:
    name: Windows x86 (XP-compat, MinGW)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64 (i686) + tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            mingw-w64 mingw-w64-tools \
            curl unzip zip

      - name: Cache SDL3 MinGW devel zip
        id: cache-sdl3-mingw
        uses: actions/cache@v4
        with:
          path: sdl3-mingw
          key: sdl3-mingw-${{ env.SDL3_VERSION }}

      - name: Download SDL3 MinGW devel
        if: steps.cache-sdl3-mingw.outputs.cache-hit != 'true'
        run: |
          mkdir -p sdl3-mingw
          cd sdl3-mingw
          curl -fLO "https://github.com/libsdl-org/SDL/releases/download/release-${SDL3_VERSION}/SDL3-devel-${SDL3_VERSION}-mingw.tar.gz"
          tar xf "SDL3-devel-${SDL3_VERSION}-mingw.tar.gz"

      - name: Locate SDL3 i686 prefix
        id: sdl3
        run: |
          SDL3_DIR="$(pwd)/sdl3-mingw/SDL3-${SDL3_VERSION}/i686-w64-mingw32"
          if [ ! -d "$SDL3_DIR" ]; then
            echo "SDL3 i686 prefix not found at $SDL3_DIR"
            find sdl3-mingw -maxdepth 4 -print | head -50
            exit 1
          fi
          {
            echo "prefix=$SDL3_DIR"
            echo "include=$SDL3_DIR/include"
            echo "lib=$SDL3_DIR/lib/libSDL3.dll.a"
            echo "dll=$SDL3_DIR/bin/SDL3.dll"
          } >> "$GITHUB_OUTPUT"

      - name: Write MinGW i686 toolchain file
        run: |
          cat > toolchain-mingw-i686.cmake <<'EOF'
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_SYSTEM_PROCESSOR i686)
          set(TOOLCHAIN_PREFIX i686-w64-mingw32)
          set(CMAKE_C_COMPILER   ${TOOLCHAIN_PREFIX}-gcc-posix)
          set(CMAKE_CXX_COMPILER ${TOOLCHAIN_PREFIX}-g++-posix)
          set(CMAKE_RC_COMPILER  ${TOOLCHAIN_PREFIX}-windres)
          set(CMAKE_FIND_ROOT_PATH /usr/${TOOLCHAIN_PREFIX})
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          # XP target: 0x0501 == Windows XP
          add_compile_definitions(_WIN32_WINNT=0x0501 WINVER=0x0501)
          # Static-link the MinGW C++/pthread runtime so the released zt.exe
          # does not depend on libwinpthread-1.dll / libgcc_s_dw2-1.dll /
          # libstdc++-6.dll being present next to it on the target machine.
          # The -posix gcc variant otherwise pulls all three as side-by-side
          # DLLs and XP fails with "Unable to Locate Component" on launch.
          add_link_options(-static -static-libgcc -static-libstdc++)
          EOF

      - name: Configure (MinGW i686, XP target)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$(pwd)/toolchain-mingw-i686.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DZT_ENABLE_ABLETON_LINK=OFF \
            -DSDL3_INCLUDE_DIR="${{ steps.sdl3.outputs.include }}" \
            -DSDL3_LIBRARY="${{ steps.sdl3.outputs.lib }}"

      - name: Build
        run: cmake --build build --config Release -j

      - name: Stage release
        run: |
          mkdir -p dist/ztrackerprime-windows-x86-xp
          cp build/Program/zt.exe                dist/ztrackerprime-windows-x86-xp/
          cp "${{ steps.sdl3.outputs.dll }}"     dist/ztrackerprime-windows-x86-xp/
          cp zt.conf                             dist/ztrackerprime-windows-x86-xp/
          cp -R skins                            dist/ztrackerprime-windows-x86-xp/
          cp -R doc                              dist/ztrackerprime-windows-x86-xp/
          cp -R assets/ccizer                    dist/ztrackerprime-windows-x86-xp/
          cp -R assets/syx                       dist/ztrackerprime-windows-x86-xp/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ztrackerprime-windows-x86-xp
          path: dist/ztrackerprime-windows-x86-xp
          if-no-files-found: error

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/pr-release-packaging'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          TAG="${RELEASE_TAG}"
          zip -r "ztrackerprime-${TAG}-windows-x86-xp.zip" ztrackerprime-windows-x86-xp

      - name: Upload release asset (windows-x86-xp)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/pr-release-packaging'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86-xp
          path: dist/ztrackerprime-*-windows-x86-xp.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows x64 -- MSVC, modern Windows 10/11 target
  # ---------------------------------------------------------------------------
  windows-x64:
    name: Windows x64 (MSVC)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SDL3 VC devel zip
        id: cache-sdl3-vc
        uses: actions/cache@v4
        with:
          path: sdl3-vc
          key: sdl3-vc-${{ env.SDL3_VERSION }}

      - name: Download SDL3 VC devel
        if: steps.cache-sdl3-vc.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path sdl3-vc | Out-Null
          $url  = "https://github.com/libsdl-org/SDL/releases/download/release-$env:SDL3_VERSION/SDL3-devel-$env:SDL3_VERSION-VC.zip"
          $zip  = "sdl3-vc/SDL3-devel.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath sdl3-vc -Force

      - name: Locate SDL3 (VC)
        id: sdl3
        shell: pwsh
        run: |
          $root = "$(Get-Location)\sdl3-vc\SDL3-$env:SDL3_VERSION"
          if (-not (Test-Path $root)) {
            Write-Host "SDL3 root not found at $root"
            Get-ChildItem sdl3-vc -Recurse | Select-Object -First 50 FullName
            exit 1
          }
          $inc = "$root\include"
          $lib = "$root\lib\x64\SDL3.lib"
          $dll = "$root\lib\x64\SDL3.dll"
          "include=$inc" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "lib=$lib"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "dll=$dll"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Configure (MSVC x64)
        shell: pwsh
        run: |
          # Ableton Link OFF on Windows for now (no Link fetch step on this
          # job; the wrapper builds as a stub). Enabling Link on MSVC x64 is a
          # follow-up — Link supports it, but it needs CI verification we can't
          # do from the macOS dev box.
          cmake -S . -B build -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DZT_ENABLE_ABLETON_LINK=OFF `
            -DSDL3_INCLUDE_DIR="${{ steps.sdl3.outputs.include }}" `
            -DSDL3_LIBRARY="${{ steps.sdl3.outputs.lib }}"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j

      - name: Stage release
        shell: pwsh
        run: |
          $dest = "dist\ztrackerprime-windows-x64"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          # MSVC multi-config places the exe in build/Program/Release
          $exe = "build\Program\Release\zt.exe"
          if (-not (Test-Path $exe)) { $exe = "build\Program\zt.exe" }
          Copy-Item $exe                       $dest
          Copy-Item "${{ steps.sdl3.outputs.dll }}" $dest
          Copy-Item zt.conf                    $dest
          Copy-Item skins -Recurse             $dest
          Copy-Item doc   -Recurse             $dest
          Copy-Item assets\ccizer -Recurse     $dest
          Copy-Item assets\syx    -Recurse     $dest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ztrackerprime-windows-x64
          path: dist/ztrackerprime-windows-x64
          if-no-files-found: error

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/pr-release-packaging'
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          Set-Location dist
          Compress-Archive -Path ztrackerprime-windows-x64 `
            -DestinationPath "ztrackerprime-$tag-windows-x64.zip" -Force

      - name: Upload release asset (windows-x64)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/pr-release-packaging'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: dist/ztrackerprime-*-windows-x64.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release — runs only on tag pushes (v*). Gathers the release-* artifacts
  # from each platform job and publishes a draft GitHub Release. Draft, not
  # published, so the maintainer reviews the asset list before announcing.
  #
  # Codesigning / notarization are intentionally skipped for this first pass
  # (explicitly approved). macOS DMGs are ad-hoc signed only — users will see
  # the Gatekeeper warning and can right-click > Open on first launch.
  # Adding a Developer ID Application cert + notarytool + signing secrets
  # is a follow-up PR once the basic tag-to-release flow is validated.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release (draft)
    # Real-tag-only — manual dispatch exercises the packaging path but does NOT
    # publish a Release (you can still download the release-* artifacts to inspect).
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - linux-x86_64
      - macos-universal
      - windows-x86-xp
      - windows-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: List collected assets
        run: |
          set -euo pipefail
          ls -la release-assets/

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          draft: true
          generate_release_notes: true
